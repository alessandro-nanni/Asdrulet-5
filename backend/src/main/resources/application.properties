spring.application.name=asdrulet5
server.port=${PORT:8080}
# Render (and most PaaS platforms) terminate TLS at their edge and forward
# plain HTTP to the container, setting X-Forwarded-* headers. Without this,
# Spring thinks every request is insecure HTTP, which breaks the CSRF
# cookie's Secure flag and other proxy-aware behavior.
server.forward-headers-strategy=framework
# URL of the frontend allowed to talk to this backend (CORS origin and
# WebSocket origin). In production the frontend is bundled and served from
# this same origin.
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# Enables /api/parties/{code}/dev/** endpoints used by the frontend's dev-only
# "add fake members" tool to simulate multiple players from one browser
# session. Never set this to true in a public deployment.
app.dev-tools.enabled=${DEV_TOOLS_ENABLED:false}
# There's no login anywhere in this app (see SecurityConfig), so the
# UserDetailsService auto-config's generated-password fallback is dead
# weight: nothing ever checks it, it just prints a fresh password to the
# log on every startup.
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
