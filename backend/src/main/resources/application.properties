spring.application.name=asdrulet5
server.port=${PORT:8080}

# Render (and most PaaS platforms) terminate TLS at their edge and forward
# plain HTTP to the container, setting X-Forwarded-* headers. Without this,
# Spring thinks every request is insecure HTTP, which breaks OAuth2 redirect
# URI construction and cookie handling behind the proxy.
server.forward-headers-strategy=framework

# URL of the frontend that's allowed to authenticate against this backend
# (CORS origin, WebSocket origin, and post-login redirect target).
# In production the frontend is bundled and served from this same origin.
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 client, created in Google Cloud Console > APIs & Services > Credentials.
# Authorized redirect URI must be {backend-origin}/login/oauth2/code/google
# Placeholder defaults let the app boot without real credentials (Spring validates
# non-empty, not valid, at startup); actual Google login will fail until you set
# GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET to real values from Google Cloud Console.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:unset-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:unset-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Enables /api/parties/{code}/dev/** endpoints used by the frontend's dev-only
# "Quick game" tool to simulate multiple players from one browser session.
# Never set this to true in a public deployment.
app.dev-tools.enabled=${DEV_TOOLS_ENABLED:false}
